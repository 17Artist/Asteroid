name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 启动器用 JDK 21，工具链需要 JDK 25 来编译 26.x（MC 26.1.1/26.1.2/26.2）模块。
      # 多版本时最后一个为默认 JAVA_HOME（21），同时导出 JAVA_HOME_21_X64 / JAVA_HOME_25_X64。
      - name: Set up JDK 21 + 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            25
            21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./gradlew clean build -Pversion=${{ steps.version.outputs.version }} "-Dorg.gradle.java.installations.paths=$JAVA_HOME_21_X64,$JAVA_HOME_25_X64"

      - name: Publish to Maven repository
        env:
          repo: ${{ secrets.MAVEN_REPO_PASSWORD }}
        run: ./gradlew deploy -Pversion=${{ steps.version.outputs.version }} "-Dorg.gradle.java.installations.paths=$JAVA_HOME_21_X64,$JAVA_HOME_25_X64"
